<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background tile so the brand mark is visible against any tab color -->
  <rect width="32" height="32" rx="6" fill="#059669"/>

  <!-- Container body, white-on-emerald for max contrast at favicon size -->
  <rect x="4" y="10" width="20" height="12" rx="2" fill="white"/>

  <!-- Corrugation ridges — emerald lines on white container -->
  <line x1="8.5" y1="13" x2="8.5" y2="19" stroke="#059669" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="13" x2="12" y2="19" stroke="#059669" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15.5" y1="13" x2="15.5" y2="19" stroke="#059669" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="13" x2="19" y2="19" stroke="#059669" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Approved checkmark badge in the bottom-right corner -->
  <circle cx="24" cy="22" r="5" fill="white"/>
  <circle cx="24" cy="22" r="4" fill="#10b981"/>
  <path d="M22 22 L23.3 23.3 L26 20.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
